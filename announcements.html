<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestOS | Premium Announcement Portal</title>
    
    <link rel="icon" href="data:,"> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');

:root {
    /* Premium Palette Architecture */
    --primary: #4F46E5;
    --primary-gradient: linear-gradient(135deg, #4F46E5 0%, #6366F1 100%);
    
    --danger: #E11D48;
    --success-hover: #059669;
    --success-light: #ECFDF5;
    --warning-hover: #D97706;
    --warning-light: #FEF3C7;
    
    /* Neutrals & Surfaces */
    --bg-main: #F1F5F9; 
    --bg-surface: #FFFFFF;
    --text-main: #0F172A;
    --text-muted: #64748B;
    --border: #E2E8F0;
    
    /* Mobile Elevations */
    --shadow-nav: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-card: 0 2px 10px rgba(15, 23, 42, 0.04);
    
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    
    --transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
}

/* --- SYSTEM RESET --- */
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
    -webkit-tap-highlight-color: transparent; 
}

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    /* Safe padding so content slides under the fixed header */
    padding-top: 85px;
    padding-bottom: calc(2rem + env(safe-area-inset-bottom));
}

.container { 
    width: 100%; 
    padding: 1rem; 
    margin: 0 auto; 
}

/* --- MOBILE APP SHELL (NAVBAR) --- */
.header { 
    position: fixed; 
    top: 0; left: 0; right: 0; 
    background: rgba(255, 255, 255, 0.95); 
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    z-index: 100;
    padding: 1.25rem;
    box-shadow: var(--shadow-nav);
    border-bottom: 1px solid rgba(226, 232, 240, 0.6);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.brand { display: flex; align-items: center; gap: 0.6rem; }

.live-indicator { 
    width: 10px; height: 10px; 
    background-color: var(--danger); 
    border-radius: 50%; 
    animation: pulse 2s infinite; 
}
@keyframes pulse { 
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.4); } 
    70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(225, 29, 72, 0); } 
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); } 
}

.header h1 { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    font-size: 1.35rem; font-weight: 800; 
    color: transparent;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    letter-spacing: -0.5px;
    text-transform: uppercase;
}

.live-clock { 
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem; font-weight: 700; 
    color: var(--text-main); 
    background: var(--bg-main); 
    padding: 0.4rem 0.75rem; 
    border-radius: var(--radius-md); 
    border: 1px solid var(--border); 
}

/* --- MOBILE CARDS --- */
.announcement-grid { display: flex; flex-direction: column; gap: 1rem; }

.announcement-card { 
    background: var(--bg-surface); 
    border-radius: var(--radius-xl); 
    padding: 1.5rem 1.25rem; 
    box-shadow: var(--shadow-card); 
    border: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 1.25rem;
    animation: fadeUp 0.3s ease forwards;
    transition: var(--transition);
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* Strikethrough Announced State */
.announcement-card.announced { 
    background: var(--bg-main); 
    border-color: var(--border); 
    opacity: 0.8;
}
.announcement-card.announced .comp-name { 
    text-decoration: line-through; 
    color: var(--text-muted); 
}

.comp-details { display: flex; flex-direction: column; gap: 0.6rem; }

.comp-name { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    font-size: 1.35rem; font-weight: 700; 
    color: var(--text-main); 
    line-height: 1.2;
}

.comp-stage { 
    font-size: 0.9rem; font-weight: 600; 
    color: var(--text-muted); 
    display: flex; align-items: center; gap: 0.5rem; 
}

/* --- UNIVERSAL TYPOGRAPHY BADGES --- */
.comp-status { 
    padding: 0.35rem 0.75rem; 
    border-radius: 50px; 
    font-size: 0.75rem; font-weight: 700; 
    text-transform: uppercase; 
    letter-spacing: 0.05em; 
    width: fit-content; 
    border: 1px solid transparent; 
}
.status-registration { background: #DBEAFE; color: #1D4ED8; border-color: rgba(29, 78, 216, 0.2); }
.status-ongoing { background: var(--success-light); color: var(--success-hover); border-color: rgba(16, 185, 129, 0.2); }
.announced .comp-status { background: var(--border); color: var(--text-muted); }

/* --- TOUCH-FRIENDLY BUTTONS --- */
.actions-wrapper { width: 100%; }

.btn { 
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; 
    width: 100%; min-height: 52px; /* Strict minimum for mobile tapping */
    border-radius: var(--radius-md); 
    font-weight: 600; font-size: 0.95rem; 
    cursor: pointer; border: none; transition: var(--transition); 
}
.btn:active { transform: scale(0.97); }

.btn-announce { 
    background: var(--primary-gradient); color: white; 
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); 
}
.btn-undo { 
    background: var(--bg-surface); border: 1px solid var(--border); 
    color: var(--text-main); box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
}

/* --- SKELETON & EMPTY STATES --- */
.empty-state { 
    text-align: center; padding: 4rem 1.5rem; 
    color: var(--text-muted); font-size: 1rem; font-weight: 500; 
    background: var(--bg-surface); border-radius: var(--radius-xl); 
    border: 1px dashed var(--border); 
}

.skeleton-card { 
    background: var(--bg-surface); border-radius: var(--radius-xl); 
    height: 160px; padding: 1.5rem 1.25rem; 
    display: flex; flex-direction: column; gap: 1rem; 
    border: 1px solid var(--border); 
}

.skeleton-line { 
    background: linear-gradient(90deg, var(--bg-main) 25%, var(--border) 50%, var(--bg-main) 75%); 
    background-size: 200% 100%; 
    animation: loading-shimmer 1.5s infinite; 
    border-radius: 4px; 
}
@keyframes loading-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Strict Mobile UI Overrides */
@media (min-width: 768px) {
    /* If opened on a tablet, it mimics a slightly wider card layout natively */
    .container { max-width: 600px; padding: 2rem; }
}
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="live-indicator"></div>
                <h1>Live Announcements</h1>
            </div>
            <div class="live-clock" id="clock">--:--:--</div>
        </div>

        <div class="announcement-grid" id="announcement-container">
            <div class="skeleton-card">
                <div class="skeleton-line" style="width: 120px; height: 16px;"></div>
                <div class="skeleton-line" style="width: 60%; height: 32px;"></div>
                <div class="skeleton-line" style="width: 200px; height: 16px;"></div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            const SUPABASE_URL = 'https://amdpvvwgttzzwaxnufcs.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_XkHBI5AuYWo4klAdKWI1ag_mp4psVSA';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            }, 1000);

            let announcedList = JSON.parse(localStorage.getItem('announcedComps')) || [];

            async function fetchLiveCompetitions() {
                try {
                    const { data: comps, error } = await supabase
                        .from('competitions')
                        .select('id, name, status, stages(name)')
                        .in('status', ['registration', 'ongoing'])
                        .order('status', { ascending: true });

                    if (error) throw error;
                    renderAnnouncements(comps || []);
                } catch (error) {
                    console.error('Error fetching data:', error);
                    document.getElementById('announcement-container').innerHTML = `
                        <div class="empty-state" style="border-color: rgba(239,68,68,0.2)">
                            <span style="color: #ef4444; font-weight: 600;">System Connection Failed</span><br/>
                            <span style="font-size: 0.9rem; margin-top: 0.5rem; display: block;">Make sure you are connected to the internet. Retrying...</span>
                        </div>`;
                }
            }

            function renderAnnouncements(comps) {
                const container = document.getElementById('announcement-container');
                container.innerHTML = '';

                if (comps.length === 0) {
                    container.innerHTML = `<div class="empty-state">No real-time active competitions right now.</div>`;
                    return;
                }

                comps.forEach(comp => {
                    const isAnnounced = announcedList.includes(comp.id);
                    
                    let stageName = 'Global Stage';
                    if (comp.stages) {
                        if (Array.isArray(comp.stages)) stageName = comp.stages[0]?.name || stageName;
                        else if (typeof comp.stages === 'object') stageName = comp.stages.name || stageName;
                    }
                    
                    const isReg = comp.status === 'registration';
                    const statusClass = isReg ? 'status-registration' : 'status-ongoing';
                    const statusText = isReg ? 'Registration Open' : 'Ongoing Event';
                        
                    // Attach functions to window so the HTML buttons can still click them
                    window.toggleAnnounced = function(compId, isMarkingAnnounced) {
                        if (isMarkingAnnounced) {
                            if (!announcedList.includes(compId)) announcedList.push(compId);
                        } else {
                            announcedList = announcedList.filter(id => id !== compId);
                        }
                        localStorage.setItem('announcedComps', JSON.stringify(announcedList));
                        fetchLiveCompetitions();
                    };

                    const buttonHTML = isAnnounced 
                        ? `<button class="btn btn-undo" onclick="window.toggleAnnounced('${comp.id}', false)">Undo Clearance</button>`
                        : `<button class="btn btn-announce" onclick="window.toggleAnnounced('${comp.id}', true)">Mark Announced</button>`;

                    container.innerHTML += `
                        <div class="announcement-card ${isAnnounced ? 'announced' : ''}">
                            <div class="comp-details">
                                <div class="comp-status ${statusClass}">${statusText}</div>
                                <div class="comp-name">${comp.name}</div>
                                <div class="comp-stage">📍 ${stageName}</div>
                            </div>
                            <div class="actions-wrapper">${buttonHTML}</div>
                        </div>
                    `;
                });
            }

            fetchLiveCompetitions();
            setInterval(fetchLiveCompetitions, 10000);
        })();
    </script>
</body>
</html>
