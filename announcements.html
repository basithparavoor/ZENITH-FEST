<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestOS | Premium Announcement Portal</title>
    
    <link rel="icon" href="data:,"> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.15);
            --bg-main: #0b0f19;
            --surface: rgba(22, 30, 49, 0.7);
            --surface-border: rgba(255, 255, 255, 0.06);
            --card-announced: rgba(17, 24, 39, 0.4);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glow: rgba(99, 102, 241, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 1.5rem;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; width: 100%; }

        .header { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--surface-border); }
        @media (min-width: 640px) { .header { flex-direction: row; justify-content: space-between; align-items: center; } }

        .brand { display: flex; align-items: center; gap: 0.75rem; }
        .live-indicator { width: 10px; height: 10px; background-color: #ef4444; border-radius: 50%; animation: pulse 1.6s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .header h1 { font-size: 1.75rem; font-weight: 800; text-transform: uppercase; background: linear-gradient(to right, #ffffff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .live-clock { font-size: 1.25rem; font-weight: 600; color: var(--text-muted); font-family: monospace; background: rgba(255, 255, 255, 0.03); padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--surface-border); }

        .announcement-grid { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
        .announcement-card { background: var(--surface); border: 1px solid var(--surface-border); border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; position: relative; overflow: hidden; transition: all 0.4s; }
        @media (min-width: 768px) { .announcement-card { flex-direction: row; justify-content: space-between; align-items: center; padding: 2rem; } }

        .announcement-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: linear-gradient(to bottom, var(--primary), #818cf8); }
        .announcement-card:not(.announced):hover { transform: translateY(-2px); border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 12px 40px var(--glow); }
        .announcement-card.announced { background: var(--card-announced); border-color: rgba(255, 255, 255, 0.02); }
        .announcement-card.announced::before { background: var(--text-muted); opacity: 0.3; }
        .announcement-card.announced .comp-name { color: var(--text-muted); text-decoration: line-through; }

        .comp-details { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        .comp-status { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.25rem 0.75rem; border-radius: 6px; width: fit-content; }
        .status-registration { background-color: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.2); }
        .status-ongoing { background-color: var(--success-bg); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.2); }
        .announced .comp-status { background-color: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid transparent; }
        .comp-name { font-size: 1.5rem; font-weight: 800; color: #ffffff; }
        @media (min-width: 768px) { .comp-name { font-size: 2rem; } }
        .comp-stage { font-size: 0.95rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem; font-weight: 500; }

        .actions-wrapper { width: 100%; }
        @media (min-width: 768px) { .actions-wrapper { width: auto; } }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 1rem 1.75rem; border-radius: 14px; font-weight: 600; font-size: 1rem; cursor: pointer; border: none; transition: 0.2s; }
        @media (min-width: 768px) { .btn { width: auto; font-size: 1.05rem; } }
        .btn-announce { background: #ffffff; color: #0b0f19; }
        .btn-announce:hover { background: #e5e7eb; transform: scale(1.02); }
        .btn-undo { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--surface-border); color: var(--text-main); }
        .btn-undo:hover { background: rgba(255, 255, 255, 0.1); }

        .empty-state { text-align: center; padding: 5rem 2rem; color: var(--text-muted); font-size: 1.1rem; background: var(--surface); border-radius: 20px; border: 1px dashed var(--surface-border); }
        .skeleton-card { background: var(--surface); border-radius: 20px; height: 140px; padding: 2rem; display: flex; flex-direction: column; gap: 0.75rem; border: 1px solid var(--surface-border); }
        .skeleton-line { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: loading-shimmer 1.5s infinite; border-radius: 4px; }
        @keyframes loading-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="live-indicator"></div>
                <h1>Live Announcements</h1>
            </div>
            <div class="live-clock" id="clock">--:--:--</div>
        </div>

        <div class="announcement-grid" id="announcement-container">
            <div class="skeleton-card">
                <div class="skeleton-line" style="width: 120px; height: 16px;"></div>
                <div class="skeleton-line" style="width: 60%; height: 32px;"></div>
                <div class="skeleton-line" style="width: 200px; height: 16px;"></div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            const SUPABASE_URL = 'https://amdpvvwgttzzwaxnufcs.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_XkHBI5AuYWo4klAdKWI1ag_mp4psVSA';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            }, 1000);

            let announcedList = JSON.parse(localStorage.getItem('announcedComps')) || [];

            async function fetchLiveCompetitions() {
                try {
                    const { data: comps, error } = await supabase
                        .from('competitions')
                        .select('id, name, status, stages(name)')
                        .in('status', ['registration', 'ongoing'])
                        .order('status', { ascending: true });

                    if (error) throw error;
                    renderAnnouncements(comps || []);
                } catch (error) {
                    console.error('Error fetching data:', error);
                    document.getElementById('announcement-container').innerHTML = `
                        <div class="empty-state" style="border-color: rgba(239,68,68,0.2)">
                            <span style="color: #ef4444; font-weight: 600;">System Connection Failed</span><br/>
                            <span style="font-size: 0.9rem; margin-top: 0.5rem; display: block;">Make sure you are connected to the internet. Retrying...</span>
                        </div>`;
                }
            }

            function renderAnnouncements(comps) {
                const container = document.getElementById('announcement-container');
                container.innerHTML = '';

                if (comps.length === 0) {
                    container.innerHTML = `<div class="empty-state">No real-time active competitions right now.</div>`;
                    return;
                }

                comps.forEach(comp => {
                    const isAnnounced = announcedList.includes(comp.id);
                    
                    let stageName = 'Global Stage';
                    if (comp.stages) {
                        if (Array.isArray(comp.stages)) stageName = comp.stages[0]?.name || stageName;
                        else if (typeof comp.stages === 'object') stageName = comp.stages.name || stageName;
                    }
                    
                    const isReg = comp.status === 'registration';
                    const statusClass = isReg ? 'status-registration' : 'status-ongoing';
                    const statusText = isReg ? 'Registration Open' : 'Ongoing Event';
                        
                    // Attach functions to window so the HTML buttons can still click them
                    window.toggleAnnounced = function(compId, isMarkingAnnounced) {
                        if (isMarkingAnnounced) {
                            if (!announcedList.includes(compId)) announcedList.push(compId);
                        } else {
                            announcedList = announcedList.filter(id => id !== compId);
                        }
                        localStorage.setItem('announcedComps', JSON.stringify(announcedList));
                        fetchLiveCompetitions();
                    };

                    const buttonHTML = isAnnounced 
                        ? `<button class="btn btn-undo" onclick="window.toggleAnnounced('${comp.id}', false)">Undo Clearance</button>`
                        : `<button class="btn btn-announce" onclick="window.toggleAnnounced('${comp.id}', true)">Mark Announced</button>`;

                    container.innerHTML += `
                        <div class="announcement-card ${isAnnounced ? 'announced' : ''}">
                            <div class="comp-details">
                                <div class="comp-status ${statusClass}">${statusText}</div>
                                <div class="comp-name">${comp.name}</div>
                                <div class="comp-stage">📍 ${stageName}</div>
                            </div>
                            <div class="actions-wrapper">${buttonHTML}</div>
                        </div>
                    `;
                });
            }

            fetchLiveCompetitions();
            setInterval(fetchLiveCompetitions, 10000);
        })();
    </script>
</body>
</html>
