<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestOS | Secure Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
       @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');

       
:root {
    /* Premium Palette Architecture (Admin Theme) */
    --primary: #4F46E5;
    --primary-hover: #4338CA;
    --primary-light: #EEF2FF;
    --primary-ring: rgba(79, 70, 229, 0.2);
    --primary-gradient: linear-gradient(135deg, #4F46E5 0%, #6366F1 100%);
    
    --danger: #E11D48;
    --danger-light: #FFF1F2;
    
    --bg-main: #F1F5F9; 
    --bg-surface: #FFFFFF;
    --text-main: #0F172A;
    --text-muted: #64748B;
    --border: #E2E8F0;
    
    /* Elevations */
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06);
    --shadow-lg: 0 16px 32px rgba(15, 23, 42, 0.08);
    --shadow-float: 0 10px 25px -5px rgba(79, 70, 229, 0.25);
    
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    
    --transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
}

/* --- SYSTEM RESET --- */
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
    -webkit-tap-highlight-color: transparent;
}

body {
    background-color: var(--bg-main);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
    color: var(--text-main);
    -webkit-font-smoothing: antialiased;
}

/* --- APP-LIKE LOGIN CARD --- */
.login-container {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 2.5rem 2rem;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 420px;
    transform: translateY(10px);
    opacity: 0;
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes slideUp {
    to { transform: translateY(0); opacity: 1; }
}

/* --- HEADER --- */
.header { text-align: center; margin-bottom: 2.5rem; }
.header h1 { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    font-size: 2rem; 
    font-weight: 800; 
    margin-bottom: 0.5rem; 
    letter-spacing: -0.5px;
    color: transparent;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
}
.header p { 
    color: var(--text-muted); 
    font-size: 0.95rem; 
    font-weight: 500; 
}

/* --- FORM ELEMENTS --- */
.input-group { margin-bottom: 1.5rem; }
.input-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-main);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.02em;
}

.input-wrapper { position: relative; display: flex; align-items: center; }

.input-group input {
    width: 100%;
    padding: 0.85rem 1rem;
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-main);
    transition: var(--transition);
    outline: none;
    min-height: 52px; /* Touch target for mobile */
    appearance: none;
}

.input-group input[type="password"],
.input-group input[type="text"].password-visible {
    padding-right: 3rem;
}

.input-group input::placeholder { color: #94A3B8; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.03em; }
.input-group input:focus {
    border-color: var(--primary);
    background: var(--bg-surface);
    box-shadow: 0 0 0 4px var(--primary-ring);
}

/* --- PASSWORD TOGGLE --- */
.toggle-password {
    position: absolute;
    right: 0.5rem;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: var(--transition);
}
.toggle-password:active { background: var(--bg-main); transform: scale(0.9); }

/* --- OPTIONS ROW --- */
.options-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
}
.remember-me {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
}
.remember-me input {
    accent-color: var(--primary);
    width: 1.25rem;
    height: 1.25rem;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid var(--border);
}

/* --- BUTTON --- */
.btn-primary {
    width: 100%;
    min-height: 52px; /* Touch friendly */
    background: var(--primary-gradient);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.02em;
}
.btn-primary:active { 
    transform: scale(0.97); 
    box-shadow: var(--shadow-float); 
}

/* --- PUBLIC LINKS (BOTTOM NAV) --- */
.public-links {
    margin-top: 2.5rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    padding-top: 1.5rem;
    border-top: 1px dashed var(--border);
}
.public-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    transition: var(--transition);
    padding: 0.5rem;
}
.public-links a:active { color: var(--primary); }
.public-links span { color: var(--border); }

/* --- ERROR MESSAGE --- */
#error-message {
    display: none;
    background: var(--danger-light);
    border: 1px solid rgba(225, 29, 72, 0.2);
    color: var(--danger);
    padding: 1rem;
    border-radius: var(--radius-md);
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    text-align: center;
    animation: fadeIn 0.3s ease forwards;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* ========================================================================
   STRICT MOBILE UI OVERRIDES (NATIVE APP FEEL)
   ======================================================================== */
@media (max-width: 768px) {
    body {
        align-items: flex-end; /* Pushes the card down like a drawer */
        padding: 0;
        background-color: var(--bg-surface); /* Make the whole screen feel seamless */
    }

    .login-container {
        border-radius: 32px 32px 0 0;
        border: none;
        border-top: 1px solid var(--border);
        box-shadow: 0 -10px 40px rgba(0,0,0,0.05);
        padding: 2.5rem 1.5rem calc(2rem + env(safe-area-inset-bottom)) 1.5rem; /* iOS Safe Area */
        max-width: 100%;
        min-height: 85vh; /* Acts like a large bottom sheet */
        display: flex;
        flex-direction: column;
        transform: translateY(100%);
    }

    /* Decorative drawer pull handle at the top */
    .login-container::before {
        content: '';
        display: block;
        width: 40px;
        height: 5px;
        background: var(--border);
        border-radius: 10px;
        margin: 0 auto 2.5rem auto;
    }

    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 2.25rem; }

    .input-group label { font-size: 0.9rem; }
    
    /* Ensure inputs don't zoom on iOS by forcing font-size 16px (1rem) */
    .input-group input { font-size: 1rem !important; }

    .public-links {
        margin-top: auto; /* Pushes links to the very bottom */
        padding-top: 2rem;
    }
}
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header">
            <h1 class="brand">FestOS</h1>
            <p>Enter your credentials to continue</p>
        </div>

        <div id="error-message"></div>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="admin, judge1, etc." required autocomplete="off">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                        <!-- Default Eye Icon -->
                        <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.543 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="options-row">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    Remember me
                </label>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">Authenticate</button>
        </form>

    
    </div>

    <script src="login.js"></script>
</body>
</html>
