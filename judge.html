<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestOS | Judge Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --bg-color: #F3F4F6;
            --surface: #FFFFFF;
            --text-main: #111827;
            --border: #E5E7EB;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); padding: 1rem; color: var(--text-main); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.5rem; }
        .logout-btn { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; background: white; }

        .card { background: var(--surface); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: white; width: 100%; transition: 0.2s; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Evaluation Table UI */
        .eval-container { display: none; margin-top: 1.5rem; }
        .eval-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        
        .participant-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px dashed var(--border); }
        .code-letter { font-size: 1.5rem; font-weight: 700; color: var(--primary); width: 60px; text-align: center; background: #EEF2FF; border-radius: 8px; padding: 0.5rem; }
        
        .mark-input { width: 100px; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; font-size: 1.25rem; text-align: center; outline: none; }
        .mark-input:focus { border-color: var(--primary); }
        .max-mark-label { font-size: 0.875rem; color: #6B7280; margin-left: 0.5rem; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>Judge Portal</h1>
            <p id="judge-name" style="color: #6B7280; font-size: 0.875rem;">Loading profile...</p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="dashboard-view">
        <h2 style="font-size: 1.1rem; margin-bottom: 1rem;">Ongoing Competitions</h2>
        <div id="competitions-container">
            <!-- Competitions injected here -->
        </div>
    </div>

    <div id="evaluation-view" class="card eval-container">
        <div class="eval-header">
            <h2 id="eval-comp-name">Competition Name</h2>
            <button class="logout-btn" onclick="closeEvaluation()">Back</button>
        </div>
        <div id="participants-container">
            <!-- Participants list injected here -->
        </div>
        <button class="btn btn-success" style="margin-top: 1.5rem;" onclick="submitJudgement()" id="submit-btn">Submit All Marks</button>
    </div>

    <script src="judge.js"></script>
</body>
</html>
