<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestOS | Premium Manager</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --success-hover: #059669;
            --dark: #1F2937;
            --bg-main: #F9FAFB;
            --bg-surface: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius-md: 10px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { display: flex; height: 100vh; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; }

        /* --- Sidebar & Navigation --- */
        .sidebar { width: 280px; background: var(--bg-surface); border-right: 1px solid var(--border); padding: 2rem 1.5rem; display: flex; flex-direction: column; z-index: 10; }
        .brand { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 2.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .nav-items { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
        .nav-item { padding: 0.875rem 1rem; border-radius: var(--radius-md); cursor: pointer; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 0.75rem; transition: all 0.2s ease; }
        .nav-item i { font-size: 1.25rem; }
        .nav-item:hover { background: #F3F4F6; color: var(--text-main); }
        .nav-item.active { background: #EEF2FF; color: var(--primary); }

        /* --- Main Content Area --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--bg-main); }
        .header { background: var(--bg-surface); padding: 1.25rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
        .content-section { display: none; padding: 2rem; animation: fadeIn 0.4s ease; max-width: 1400px; margin: 0 auto; width: 100%; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-header { margin-bottom: 1.5rem; }
        .section-header h2 { font-size: 1.5rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; }
        .section-header p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; }

        /* --- Premium Toolbar --- */
        .toolbar { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; justify-content: space-between; background: var(--bg-surface); padding: 1rem 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .toolbar-group { display: flex; gap: 0.75rem; flex-wrap: wrap; flex: 1; align-items: center; }
        .toolbar-actions { display: flex; gap: 0.75rem; }
        
        .control-input { padding: 0.625rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 0.875rem; outline: none; background: var(--bg-main); color: var(--text-main); min-width: 180px; transition: all 0.2s; }
        .control-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); background: var(--bg-surface); }
        
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-wrapper i { position: absolute; left: 1rem; color: var(--text-muted); }
        .search-wrapper input { padding-left: 2.5rem; width: 250px; }

        /* --- UI Elements --- */
        .btn { padding: 0.625rem 1rem; border-radius: var(--radius-md); font-weight: 500; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; font-size: 0.875rem; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover:not(:disabled) { background: var(--success-hover); }
        .btn-dark { background: var(--dark); color: white; }
        .btn-dark:hover:not(:disabled) { background: #111827; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: #F9FAFB; }

        .badge { padding: 0.25rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: capitalize; letter-spacing: 0.025em; }
        .badge-pending { background: #FEF3C7; color: #D97706; }
        .badge-ongoing { background: #DBEAFE; color: #2563EB; }
        .badge-ready { background: #D1FAE5; color: #059669; }

        /* --- Cards --- */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .card { background: var(--bg-surface); padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .card-title { font-weight: 600; font-size: 1.125rem; line-height: 1.4; }
        .card-meta { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .assigned-judges { background: #F9FAFB; padding: 0.75rem; border-radius: var(--radius-md); margin: 1rem 0; font-size: 0.875rem; }
        .form-group { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
        .form-group select { width: 100%; padding: 0.625rem; border: 1px solid var(--border); border-radius: var(--radius-md); outline: none; margin-bottom: 0.75rem; font-size: 0.875rem; background-color: var(--bg-main); }
        .form-group select:focus { border-color: var(--primary); }

        /* --- Toast Notifications --- */
        #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 50; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { background: var(--bg-surface); border-left: 4px solid var(--primary); padding: 1rem 1.25rem; border-radius: var(--radius-md); box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 0.75rem; min-width: 300px; animation: slideIn 0.3s ease forwards; }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: #EF4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 1rem; flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--border); }
            .brand { margin-bottom: 0; margin-right: 1.5rem; font-size: 1.25rem; }
            .nav-items { flex-direction: row; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.25rem; }
            .nav-item { padding: 0.5rem 0.75rem; white-space: nowrap; font-size: 0.875rem; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-wrapper input { width: 100%; }
            #toast-container { bottom: 1rem; right: 1rem; left: 1rem; }
            .toast { min-width: 100%; }
        }
        /* --- Judge Interactive Tags --- */
        .judge-tags-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 0.5rem; 
            margin-top: 0.5rem; 
        }
        
        .judge-tag { 
            display: inline-flex; 
            align-items: center; 
            gap: 0.375rem; 
            background: #EEF2FF; 
            color: var(--primary); 
            padding: 0.25rem 0.625rem; 
            border-radius: 9999px; /* Pill shape */
            font-size: 0.75rem; 
            font-weight: 600; 
            border: 1px solid #C7D2FE;
        }
        
        .judge-tag button { 
            background: none; 
            border: none; 
            color: var(--primary); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 2px; 
            border-radius: 50%; 
            transition: all 0.2s; 
        }
        
        .judge-tag button:hover { 
            background: #C7D2FE; 
            color: #312E81; 
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><i class="ph-fill ph-crown"></i> FestOS</div>
        <div class="nav-items">
            <div class="nav-item active" onclick="switchTab('assignments')"><i class="ph ph-users-three"></i> Assign Judges</div>
            <div class="nav-item" onclick="switchTab('publish')"><i class="ph ph-megaphone"></i> Publish Results</div>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 style="font-size: 1.125rem; font-weight: 600;">Manager Dashboard</h1>
            <button class="btn btn-outline" onclick="logout()"><i class="ph ph-sign-out"></i> Logout</button>
        </div>

        <div id="assignments" class="content-section active">
            <div class="section-header">
                <h2>Competition Assignments</h2>
                <p>Manage and allocate judges. Use the filters below to organize your workflow.</p>
            </div>

            <div class="toolbar">
                <div class="toolbar-group">
                    <div class="search-wrapper">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" id="searchInput" class="control-input" placeholder="Search competitions..." oninput="filterCompetitions()">
                    </div>
                    <select id="categoryFilter" class="control-input" onchange="filterCompetitions()">
                        <option value="all">All Categories</option>
                        </select>
                    <select id="statusFilter" class="control-input" onchange="filterCompetitions()">
                        <option value="all">Assignment Status (All)</option>
                        <option value="unassigned">Needs Judges</option>
                        <option value="assigned">Judges Assigned</option>
                    </select>
                </div>
                <div class="toolbar-actions">
                    <button class="btn btn-outline" onclick="exportToCSV()"><i class="ph ph-file-csv"></i> Export CSV</button>
                    <button class="btn btn-dark" onclick="exportToPDF()"><i class="ph ph-file-pdf"></i> Download PDF</button>
                </div>
            </div>

            <div class="card-grid" id="comps-grid">
                </div>
        </div>

        <div id="publish" class="content-section">
            <div class="section-header">
                <h2>Pending Publications</h2>
                <p>Competitions below have been marked as <strong>'Judgement Complete'</strong>. Review and publish them to the Live Portal.</p>
            </div>
            <div class="card-grid" id="publish-grid">
                </div>
        </div>
    </div>

    <div id="pdf-export-container" style="display: none; padding: 40px; background: white; color: black; font-family: sans-serif;"></div>

    <div id="toast-container"></div>
    <script src="manager.js"></script>
</body>
</html>
