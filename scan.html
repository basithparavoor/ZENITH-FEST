<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Participant Verification | FestOS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;600&display=swap');

        :root {
            --primary: #6366F1;
            --success: #10B981;
            --danger: #F43F5E;
            --bg-main: #F4F7FE;
            --text-main: #1E293B;
            --text-muted: #64748B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        .container {
            width: 100%; max-width: 400px; background: white; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden;
            display: none; /* Hidden until data loads */
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { background: var(--primary); color: white; text-align: center; padding: 25px 20px 40px; border-radius: 0 0 50% 50% / 0 0 20px 20px; position: relative; }
        .header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.5px; }
        
        .profile-photo {
            width: 110px; height: 110px; border-radius: 50%; border: 4px solid white;
            object-fit: cover; margin: -55px auto 15px; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: white;
        }

        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
            background: #D1FAE5; color: #065F46; font-size: 0.8rem; font-weight: 700;
            border-radius: 20px; margin-bottom: 15px; text-transform: uppercase;
        }

        .details-section { padding: 0 20px 20px; text-align: center; }
        .details-section h2 { font-family: 'Poppins', sans-serif; font-size: 1.5rem; color: var(--text-main); margin-bottom: 5px; text-transform: uppercase;}
        .details-section p.uid { font-family: monospace; font-size: 0.95rem; color: var(--text-muted); font-weight: 600; margin-bottom: 20px; }

        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; background: #F8FAFC; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #E2E8F0; }
        .grid-info div { display: flex; flex-direction: column; }
        .grid-info label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
        .grid-info span { font-size: 0.9rem; font-weight: 600; color: var(--text-main); text-transform: uppercase;}

        .competitions-list { text-align: left; padding: 0 20px 25px; }
        .competitions-list h3 { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; border-bottom: 2px solid #E2E8F0; padding-bottom: 8px; }
        
        .comp-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: white; border: 1px solid #E2E8F0; border-radius: 10px; margin-bottom: 10px; }
        .comp-item i { color: var(--primary); font-size: 1.2rem; }
        .comp-item-details { flex: 1; }
        .comp-item-details strong { display: block; font-size: 0.9rem; color: var(--text-main); }
        .comp-item-details span { font-size: 0.75rem; color: var(--text-muted); }

        /* Loader */
        #loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 15px; color: var(--primary); }
        
        /* Error State */
        #error-state { display: none; text-align: center; padding: 40px 20px; background: white; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        #error-state i { font-size: 4rem; color: var(--danger); margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fa-solid fa-circle-notch fa-spin fa-3x"></i>
        <h3 style="color: var(--text-main);">Verifying ID...</h3>
    </div>

    <div id="error-state">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <h2 style="margin-bottom: 10px; color: var(--text-main);">Invalid QR Code</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">This ID is not registered in the system or the link is broken.</p>
    </div>

    <div class="container" id="profile-container">
        <div class="header">
            <h1><i class="fa-solid fa-shield-check"></i> Fest Verification</h1>
        </div>
        
        <img src="" id="res-photo" class="profile-photo" alt="Profile">
        
        <div class="details-section">
            <div class="status-badge"><i class="fa-solid fa-circle-check"></i> Verified Participant</div>
            <h2 id="res-name">Loading...</h2>
            <p class="uid" id="res-uid">FEST-XXXXXX</p>
            
            <div class="grid-info">
                <div><label>Team</label><span id="res-team">...</span></div>
                <div><label>Category</label><span id="res-cat">...</span></div>
                <div><label>Batch No</label><span id="res-batch">...</span></div>
            </div>
        </div>

        <div class="competitions-list">
            <h3>Registered Competitions</h3>
            <div id="res-comps">
                </div>
        </div>
    </div>

    <script>
        // 1. Setup Supabase Connection (Use the exact same credentials as admin.js)
        const SUPABASE_URL = 'https://amdpvvwgttzzwaxnufcs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XkHBI5AuYWo4klAdKWI1ag_mp4psVSA';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchParticipantData() {
            // 2. Extract the ID from the URL (e.g., ?id=FEST-2026-123456)
            const urlParams = new URLSearchParams(window.location.search);
            const scannedId = urlParams.get('id');

            if (!scannedId) return showError();

            try {
                // 3. Fetch Participant Core Details
                const { data: p, error: pError } = await supabase
                    .from('participants')
                    .select('*, teams(name), categories(name)')
                    .eq('unique_id', scannedId)
                    .single();

                if (pError || !p) throw new Error("Participant not found");

                // 4. Fetch Enrolled Competitions for this participant
                const { data: comps, error: cError } = await supabase
                    .from('participant_competitions')
                    .select('competitions(name, categories(name))')
                    .eq('participant_id', p.id);

                if (cError) throw cError;

                // 5. Populate the UI
                document.getElementById('res-photo').src = p.photo_url || 'https://via.placeholder.com/150/E5E7EB/6B7280?text=NO+PHOTO';
                document.getElementById('res-name').innerText = p.name;
                document.getElementById('res-uid').innerText = p.unique_id;
                document.getElementById('res-team').innerText = p.teams?.name || 'INDEPENDENT';
                document.getElementById('res-cat').innerText = p.categories?.name || 'GENERAL';
                document.getElementById('res-batch').innerText = p.batch_no || '1';

                // Render Competitions
                const compsContainer = document.getElementById('res-comps');
                compsContainer.innerHTML = '';
                
                if (!comps || comps.length === 0) {
                    compsContainer.innerHTML = '<p style="text-align:center; color:#64748B; font-size:0.85rem; padding: 10px;">No competitions assigned yet.</p>';
                } else {
                    comps.forEach((enrollment, index) => {
                        const compName = enrollment.competitions?.name || 'Unknown Competition';
                        const compCat = enrollment.competitions?.categories?.name || 'General';
                        
                        compsContainer.innerHTML += `
                            <div class="comp-item">
                                <i class="fa-solid fa-trophy" style="color: #F59E0B;"></i>
                                <div class="comp-item-details">
                                    <strong>${compName}</strong>
                                    <span>${compCat} Category</span>
                                </div>
                            </div>
                        `;
                    });
                }

                // 6. Hide Loader, Show Profile
                document.getElementById('loader').style.display = 'none';
                document.getElementById('profile-container').style.display = 'block';

            } catch (error) {
                console.error(error);
                showError();
            }
        }

        function showError() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
        }

        // Run when page loads
        document.addEventListener("DOMContentLoaded", fetchParticipantData);
    </script>
</body>
</html>
